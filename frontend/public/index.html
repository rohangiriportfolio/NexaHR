<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexaHR — Employee Onboarding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════
   TOKENS & RESET
══════════════════════════════════════════════ */
:root {
  --bg:        #0a0c10;
  --surface:   #111318;
  --card:      #161a22;
  --border:    #1f2430;
  --border2:   #2a3040;
  --accent:    #4f8bff;
  --accent2:   #6ee7b7;
  --warn:      #f59e0b;
  --danger:    #ef4444;
  --text:      #e8ecf4;
  --muted:     #6b7694;
  --muted2:    #4a5470;
  --glow:      rgba(79,139,255,0.15);
  --r:         12px;
  --r2:        8px;
  --shadow:    0 4px 32px rgba(0,0,0,0.4);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  line-height: 1.6;
  overflow-x: hidden;
}
h1,h2,h3,h4,h5 { font-family: 'Syne', sans-serif; }
a { color: var(--accent); text-decoration: none; }
input, select, textarea {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
}

/* ══════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════ */
.hidden { display: none !important; }
.flex { display: flex; }
.items-center { align-items: center; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.gap-4 { gap: 16px; }
.ml-auto { margin-left: auto; }
.w-full { width: 100%; }
.text-muted { color: var(--muted); }
.text-accent { color: var(--accent); }
.text-green { color: var(--accent2); }
.text-warn { color: var(--warn); }
.text-danger { color: var(--danger); }

/* ══════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════ */
#toast-container {
  position: fixed; top: 20px; right: 20px;
  z-index: 9999; display: flex; flex-direction: column; gap: 10px;
}
.toast {
  padding: 12px 18px; border-radius: var(--r2);
  font-size: 13px; font-weight: 500;
  background: var(--card); border: 1px solid var(--border2);
  box-shadow: var(--shadow); max-width: 320px;
  animation: slideIn 0.3s ease;
  display: flex; align-items: center; gap: 10px;
}
.toast.success { border-left: 3px solid var(--accent2); }
.toast.error   { border-left: 3px solid var(--danger); }
.toast.warn    { border-left: 3px solid var(--warn); }
@keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ══════════════════════════════════════════════
   MODAL
══════════════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px); z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  padding: 20px; animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--card); border: 1px solid var(--border2);
  border-radius: var(--r); padding: 28px;
  width: 100%; max-width: 560px;
  box-shadow: var(--shadow), 0 0 60px rgba(79,139,255,0.08);
  animation: scaleIn 0.25s ease;
  max-height: 90vh; overflow-y: auto;
}
.modal.wide { max-width: 720px; }
@keyframes scaleIn { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
}
.modal-title { font-size: 18px; font-weight: 700; }
.close-btn {
  background: none; border: none; color: var(--muted);
  font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 6px;
  transition: all 0.2s;
}
.close-btn:hover { background: var(--border); color: var(--text); }

/* ══════════════════════════════════════════════
   LOADER
══════════════════════════════════════════════ */
#app-loader {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 9000; flex-direction: column; gap: 16px;
}
.loader-logo { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; color: var(--accent); }
.loader-ring {
  width: 36px; height: 36px; border: 3px solid var(--border2);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ══════════════════════════════════════════════
   LOGIN PAGE
══════════════════════════════════════════════ */
#login-page {
  min-height: 100vh; display: flex;
  background: var(--bg);
}
.login-left {
  flex: 1; display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  padding: 60px; position: relative; overflow: hidden;
}
.login-left::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 60% 60% at 50% 40%, rgba(79,139,255,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.login-brand {
  display: flex; align-items: center; gap: 12px; margin-bottom: 48px;
}
.login-brand-icon {
  width: 48px; height: 48px; border-radius: 14px;
  background: var(--accent); display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 800; color: #fff; font-family: 'Syne', sans-serif;
}
.login-brand-name { font-size: 26px; font-weight: 800; font-family: 'Syne', sans-serif; }
.login-card {
  width: 100%; max-width: 420px;
  background: var(--card); border: 1px solid var(--border2);
  border-radius: var(--r); padding: 36px;
  box-shadow: var(--shadow), 0 0 60px rgba(79,139,255,0.06);
}
.login-tabs {
  display: flex; gap: 4px; background: var(--surface);
  border-radius: var(--r2); padding: 4px; margin-bottom: 28px;
}
.login-tab {
  flex: 1; text-align: center; padding: 9px;
  border-radius: 6px; cursor: pointer;
  font-weight: 500; font-size: 13px; color: var(--muted);
  transition: all 0.2s; border: none; background: none;
}
.login-tab.active {
  background: var(--accent); color: #fff;
}
.login-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.login-sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }

.login-right {
  width: 420px; background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column; justify-content: center;
  align-items: center; padding: 60px 40px;
}
.login-right-illo { text-align: center; }
.login-right-illo svg { width: 220px; height: 220px; margin-bottom: 24px; }
.login-right-illo h2 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
.login-right-illo p { color: var(--muted); font-size: 13px; line-height: 1.7; max-width: 240px; margin: 0 auto; }

/* ══════════════════════════════════════════════
   FORM ELEMENTS
══════════════════════════════════════════════ */
.form-group { margin-bottom: 16px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.input {
  width: 100%; background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--r2); padding: 10px 14px; color: var(--text);
  transition: all 0.2s; outline: none;
}
.input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,139,255,0.12); }
.input::placeholder { color: var(--muted2); }
select.input option { background: var(--card); }

/* ══════════════════════════════════════════════
   BUTTONS
══════════════════════════════════════════════ */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 18px; border-radius: var(--r2);
  font-size: 13px; font-weight: 600; cursor: pointer;
  border: none; transition: all 0.2s; font-family: 'DM Sans', sans-serif;
  white-space: nowrap;
}
.btn-primary {
  background: var(--accent); color: #fff;
}
.btn-primary:hover { background: #3b76f0; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(79,139,255,0.3); }
.btn-secondary {
  background: var(--surface); color: var(--text); border: 1px solid var(--border2);
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: rgba(239,68,68,0.12); color: var(--danger); border: 1px solid rgba(239,68,68,0.2); }
.btn-danger:hover { background: var(--danger); color: #fff; }
.btn-success { background: rgba(110,231,183,0.12); color: var(--accent2); border: 1px solid rgba(110,231,183,0.2); }
.btn-success:hover { background: var(--accent2); color: #0a0c10; }
.btn-lg { padding: 13px 24px; font-size: 14px; width: 100%; justify-content: center; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* ══════════════════════════════════════════════
   DASHBOARD LAYOUT
══════════════════════════════════════════════ */
#dashboard { height: 100vh; overflow: hidden; }
.layout { display: flex; height: 100vh; }

/* Sidebar */
.sidebar {
  width: 240px; min-width: 240px; background: var(--surface);
  border-right: 1px solid var(--border); display: flex;
  flex-direction: column; padding: 0; overflow: hidden;
}
.sidebar-brand {
  display: flex; align-items: center; gap: 10px;
  padding: 20px 20px 16px; border-bottom: 1px solid var(--border);
}
.sidebar-brand-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--accent); display: flex; align-items: center;
  justify-content: center; font-size: 16px; font-weight: 800;
  color: #fff; font-family: 'Syne', sans-serif;
}
.sidebar-brand-name { font-size: 18px; font-weight: 800; font-family: 'Syne', sans-serif; }
.sidebar-role {
  padding: 10px 20px; font-size: 11px; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
  border-bottom: 1px solid var(--border); background: rgba(79,139,255,0.04);
}
.sidebar-role span { color: var(--accent); }
.sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 20px; cursor: pointer; color: var(--muted);
  font-weight: 500; transition: all 0.15s; font-size: 13.5px;
  border-left: 3px solid transparent; margin-bottom: 2px;
}
.nav-item:hover { color: var(--text); background: rgba(255,255,255,0.04); }
.nav-item.active { color: var(--accent); background: rgba(79,139,255,0.08); border-left-color: var(--accent); }
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
.sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); }
.user-card {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: var(--r2);
  background: var(--card); border: 1px solid var(--border);
}
.user-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #6ee7b7);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.user-info { flex: 1; min-width: 0; }
.user-name { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.user-role { font-size: 11px; color: var(--muted); }
.logout-btn {
  background: none; border: none; color: var(--muted); cursor: pointer;
  padding: 4px; border-radius: 6px; transition: all 0.2s; display: flex;
}
.logout-btn:hover { color: var(--danger); background: rgba(239,68,68,0.1); }

/* Main content */
.main-content { flex: 1; overflow-y: auto; background: var(--bg); }
.page-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 28px 32px 20px; border-bottom: 1px solid var(--border);
  background: var(--surface); position: sticky; top: 0; z-index: 10;
}
.page-title { font-size: 22px; font-weight: 700; }
.page-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
.content-body { padding: 28px 32px; }

/* ══════════════════════════════════════════════
   STATS CARDS
══════════════════════════════════════════════ */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
.stat-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r); padding: 20px;
  transition: all 0.2s; position: relative; overflow: hidden;
}
.stat-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
}
.stat-card:nth-child(1)::before { background: var(--accent); }
.stat-card:nth-child(2)::before { background: var(--accent2); }
.stat-card:nth-child(3)::before { background: var(--warn); }
.stat-card:nth-child(4)::before { background: var(--danger); }
.stat-card:hover { border-color: var(--border2); transform: translateY(-2px); }
.stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); font-weight: 600; margin-bottom: 10px; }
.stat-value { font-size: 32px; font-weight: 800; font-family: 'Syne', sans-serif; }
.stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* ══════════════════════════════════════════════
   TABLE
══════════════════════════════════════════════ */
.table-container {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden;
}
.table-toolbar {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.search-input {
  flex: 1; min-width: 200px; background: var(--surface);
  border: 1px solid var(--border2); border-radius: var(--r2);
  padding: 9px 14px; color: var(--text); outline: none;
  transition: all 0.2s; font-size: 13px;
}
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,139,255,0.1); }
.filter-select {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--r2); padding: 9px 12px; color: var(--text);
  font-size: 13px; outline: none; cursor: pointer;
}
table { width: 100%; border-collapse: collapse; }
thead tr { border-bottom: 1px solid var(--border); }
th {
  text-align: left; padding: 12px 16px;
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px;
  font-weight: 600; color: var(--muted);
}
td { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
tr:last-child td { border-bottom: none; }
tbody tr { transition: background 0.15s; }
tbody tr:hover { background: rgba(255,255,255,0.025); }
.badge {
  display: inline-block; padding: 3px 10px; border-radius: 99px;
  font-size: 11px; font-weight: 600;
}
.badge-active   { background: rgba(110,231,183,0.12); color: var(--accent2); }
.badge-inactive { background: rgba(239,68,68,0.12);   color: var(--danger); }
.emp-name-cell { display: flex; align-items: center; gap: 10px; }
.emp-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.emp-code { font-size: 12px; color: var(--muted); font-family: monospace; }
.actions { display: flex; gap: 6px; }
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--muted);
}
.empty-state svg { width: 60px; height: 60px; margin: 0 auto 16px; opacity: 0.3; display: block; }
.empty-state h3 { font-size: 16px; margin-bottom: 6px; color: var(--text); }

/* ══════════════════════════════════════════════
   EMPLOYEE PROFILE CARD
══════════════════════════════════════════════ */
.profile-hero {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r); padding: 32px;
  display: flex; gap: 28px; align-items: flex-start;
  margin-bottom: 20px; position: relative; overflow: hidden;
}
.profile-hero::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
}
.profile-avatar-lg {
  width: 80px; height: 80px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 700; color: #fff; flex-shrink: 0;
  background: linear-gradient(135deg, var(--accent), #6ee7b7);
}
.profile-meta h2 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.profile-meta p { color: var(--muted); font-size: 14px; margin-bottom: 12px; }
.profile-tags { display: flex; gap: 8px; flex-wrap: wrap; }
.profile-tag {
  padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: 600;
  background: rgba(79,139,255,0.1); color: var(--accent); border: 1px solid rgba(79,139,255,0.2);
}
.info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.info-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r); padding: 20px;
}
.info-card-title {
  font-size: 12px; text-transform: uppercase; letter-spacing: 0.8px;
  font-weight: 600; color: var(--muted); margin-bottom: 16px;
  padding-bottom: 10px; border-bottom: 1px solid var(--border);
}
.info-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
.info-row:last-child { border-bottom: none; }
.info-label { color: var(--muted); font-size: 12px; }
.info-value { font-weight: 500; font-size: 13px; text-align: right; }
.credential-box {
  background: rgba(79,139,255,0.06); border: 1px solid rgba(79,139,255,0.2);
  border-radius: var(--r); padding: 20px; margin-top: 16px;
}
.credential-title { font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.cred-field { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: var(--bg); border-radius: var(--r2); margin-bottom: 6px; }
.cred-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
.cred-value { font-family: monospace; font-size: 14px; font-weight: 600; color: var(--accent2); }

/* ══════════════════════════════════════════════
   DEPT CHART
══════════════════════════════════════════════ */
.dept-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.dept-name { width: 110px; font-size: 12px; color: var(--muted); flex-shrink: 0; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
.dept-track { flex: 1; background: var(--surface); border-radius: 99px; height: 8px; overflow: hidden; }
.dept-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.6s ease; }
.dept-count { width: 24px; text-align: right; font-size: 12px; font-weight: 600; color: var(--text); }

/* ══════════════════════════════════════════════
   SUCCESS CREDENTIAL MODAL
══════════════════════════════════════════════ */
.success-icon { text-align: center; margin-bottom: 20px; }
.success-icon svg { width: 56px; height: 56px; color: var(--accent2); }
.cred-copy-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.cred-input { flex: 1; background: var(--bg); border: 1px solid var(--border2); border-radius: var(--r2); padding: 10px 14px; color: var(--accent2); font-family: monospace; font-size: 14px; outline: none; }
.copy-btn { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--r2); padding: 10px 14px; cursor: pointer; color: var(--muted); font-size: 12px; transition: all 0.2s; white-space: nowrap; }
.copy-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<!-- App Loader -->
<div id="app-loader">
  <div class="loader-logo">NexaHR</div>
  <div class="loader-ring"></div>
</div>

<!-- Toast -->
<div id="toast-container"></div>

<!-- ════════════════════════════════════════
     LOGIN PAGE
════════════════════════════════════════ -->
<div id="login-page" class="hidden">
  <div class="login-left">
    <div class="login-brand">
      <div class="login-brand-icon">N</div>
      <div class="login-brand-name">NexaHR</div>
    </div>
    <div class="login-card">
      <div class="login-tabs">
        <button class="login-tab active" onclick="switchLoginTab('admin')">Admin</button>
        <button class="login-tab" onclick="switchLoginTab('employee')">Employee</button>
      </div>

      <!-- Admin Login -->
      <div id="admin-login-form">
        <div class="login-title">Welcome back</div>
        <div class="login-sub">Sign in to your admin dashboard</div>
        <div class="form-group">
          <label>Username</label>
          <input class="input" id="admin-username" type="text" placeholder="admin" autocomplete="username">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input class="input" id="admin-password" type="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn btn-primary btn-lg" onclick="adminLogin()">Sign in as Admin</button>
        <p style="text-align:center;margin-top:14px;font-size:12px;color:var(--muted)">Default: admin / Admin@123</p>
      </div>

      <!-- Employee Login -->
      <div id="employee-login-form" class="hidden">

<!-- ════════════════════════════════════════
     MODALS
════════════════════════════════════════ -->
<div id="modal-root"></div>

<script>
/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
const API = 'https://nexahr.onrender.com/api';
let state = {
  token: null, role: null, user: null,
  currentPage: null, employees: [], stats: {}
};

/* ══════════════════════════════════════════
   UTILS
══════════════════════════════════════════ */
function toast(msg, type = 'success') {
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  const icons = { success: '✓', error: '✕', warn: '!' };
  el.className = `toast ${type}`;
  el.innerHTML = `<span style="font-size:16px">${icons[type]||'•'}</span>${msg}`;
  c.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function apiFetch(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
  return fetch(API + path, { ...opts, headers: { ...headers, ...opts.headers } })
    .then(async r => {
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || 'Request failed');
      return data;
    });
}

function avatarColor(name = '') {
  const colors = ['#4f8bff','#6ee7b7','#f59e0b','#ef4444','#a78bfa','#fb7185','#34d399'];
  let h = 0; for (const c of name) h += c.charCodeAt(0);
  return colors[h % colors.length];
}

function initials(name = '') {
  return name.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase() || '?';
}

function formatDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
}

/* ══════════════════════════════════════════
   AUTH
══════════════════════════════════════════ */
function switchLoginTab(tab) {
  document.querySelectorAll('.login-tab').forEach((el,i) => el.classList.toggle('active', (i===0&&tab==='admin')||(i===1&&tab==='employee')));
  document.getElementById('admin-login-form').classList.toggle('hidden', tab !== 'admin');
  document.getElementById('employee-login-form').classList.toggle('hidden', tab !== 'employee');
}

async function adminLogin() {
  const username = document.getElementById('admin-username').value.trim();
  const password = document.getElementById('admin-password').value;
  if (!username || !password) return toast('Enter username and password', 'warn');
  try {
    const data = await apiFetch('/admin/login', { method: 'POST', body: JSON.stringify({ username, password }) });
    state.token = data.token; state.role = 'admin'; state.user = data.username;
    // SAVE TO LOCAL STORAGE  (IMPORTANT)
    localStorage.setItem("token", data.token);
    localStorage.setItem("role", "admin");
    localStorage.setItem("user", data.username);
    enterDashboard();
  } catch(e) { toast(e.message, 'error'); }
}

async function employeeLogin() {
  const username = document.getElementById('emp-username').value.trim();
  const password = document.getElementById('emp-password').value;
  if (!username || !password) return toast('Enter credentials', 'warn');
  try {
    const data = await apiFetch('/employee/login', { method: 'POST', body: JSON.stringify({ username, password }) });
    state.token = data.token; state.role = 'employee'; state.user = data.employeeId;
    // SAVE TO LOCAL STORAGE (IMPORTANT)
    localStorage.setItem("token", data.token);
    localStorage.setItem("role", "employee");
    localStorage.setItem("user", data.employeeId);
    enterDashboard();
  } catch(e) { toast(e.message, 'error'); }
}

function logout() {
  state = { token:null, role:null, user:null, currentPage:null, employees:[], stats:{} };
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('login-page').classList.remove('hidden');
  // CLEAR LOCAL STORAGE (IMPORTANT)
  localStorage.removeItem("token");
  localStorage.removeItem("role");
  localStorage.removeItem("user");  
  toast('Logged out successfully', 'warn');
}

/* ══════════════════════════════════════════
   DASHBOARD SETUP
══════════════════════════════════════════ */
function enterDashboard() {
  document.getElementById('login-page').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  setupSidebar();
  if (state.role === 'admin') navigateTo('overview');
  else navigateTo('myprofile');
}

function setupSidebar() {
  const nav = document.getElementById('sidebar-nav');
  document.getElementById('sidebar-role').textContent = state.role === 'admin' ? 'Administrator' : 'Employee';
  document.getElementById('sidebar-username').textContent = state.user;
  document.getElementById('sidebar-userrole').textContent = state.role === 'admin' ? 'Admin' : 'Employee Portal';
  document.getElementById('user-avatar-initials').textContent = state.user.substring(0,2).toUpperCase();

  const adminNav = [
    { id:'overview', icon: iconHome(), label:'Overview' },
    { id:'employees', icon: iconPeople(), label:'Employees' },
    { id:'addemployee', icon: iconPlus(), label:'Add Employee' },
  ];
  const empNav = [
    { id:'myprofile', icon: iconPerson(), label:'My Profile' },
    { id:'changepassword', icon: iconLock(), label:'Change Password' },
  ];
  const items = state.role === 'admin' ? adminNav : empNav;
  nav.innerHTML = items.map(i => `
    <div class="nav-item" id="nav-${i.id}" onclick="navigateTo('${i.id}')">
      ${i.icon} ${i.label}
    </div>`).join('');
}

function navigateTo(page) {
  state.currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const active = document.getElementById(`nav-${page}`);
  if (active) active.classList.add('active');
  const pages = {
    overview:       renderOverview,
    employees:      renderEmployees,
    addemployee:    renderAddEmployee,
    myprofile:      renderMyProfile,
    changepassword: renderChangePassword,
  };
  if (pages[page]) pages[page]();
}

/* ══════════════════════════════════════════
   OVERVIEW PAGE
══════════════════════════════════════════ */
async function renderOverview() {
  setPage(`
    <div class="page-header">
      <div><div class="page-title">Dashboard Overview</div><div class="page-sub">Welcome back, ${state.user}</div></div>
    </div>
    <div class="content-body">
      <div class="stats-grid" id="stats-grid">
        ${[1,2,3,4].map(()=>`<div class="stat-card"><div class="stat-label">Loading…</div><div class="stat-value">—</div></div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:1fr 340px;gap:20px;margin-top:4px">
        <div class="table-container">
          <div class="table-toolbar" style="justify-content:space-between">
            <span style="font-weight:600;font-size:14px">Recent Employees</span>
            <button class="btn btn-secondary btn-sm" onclick="navigateTo('employees')">View All →</button>
          </div>
          <div id="recent-table"><div style="padding:20px;color:var(--muted)">Loading…</div></div>
        </div>
        <div class="table-container" style="padding:20px">
          <div style="font-weight:600;font-size:14px;margin-bottom:16px">By Department</div>
          <div id="dept-chart"><div style="color:var(--muted);font-size:13px">Loading…</div></div>
        </div>
      </div>
    </div>
  `);
  try {
    const [stats, emps] = await Promise.all([
      apiFetch('/admin/stats'),
      apiFetch('/admin/employees')
    ]);
    state.stats = stats; state.employees = emps;
    document.getElementById('stats-grid').innerHTML = `
      <div class="stat-card"><div class="stat-label">Total Employees</div><div class="stat-value">${stats.total}</div><div class="stat-sub">All time</div></div>
      <div class="stat-card"><div class="stat-label">Active</div><div class="stat-value" style="color:var(--accent2)">${stats.active}</div><div class="stat-sub">Currently active</div></div>
      <div class="stat-card"><div class="stat-label">This Month</div><div class="stat-value" style="color:var(--warn)">${stats.thisMonth}</div><div class="stat-sub">New joinings</div></div>
      <div class="stat-card"><div class="stat-label">Inactive</div><div class="stat-value" style="color:var(--danger)">${stats.inactive}</div><div class="stat-sub">Deactivated</div></div>
    `;
    const recent = emps.slice(0,5);
    document.getElementById('recent-table').innerHTML = recent.length ? `
      <table><thead><tr><th>Employee</th><th>Designation</th><th>DOJ</th><th>Status</th></tr></thead>
      <tbody>${recent.map(e=>`
        <tr>
          <td><div class="emp-name-cell"><div class="emp-avatar" style="background:${avatarColor(e.name)}">${initials(e.name)}</div><div><div style="font-weight:500">${e.name}</div><div class="emp-code">${e.employeeId}</div></div></div></td>
          <td>${e.designation}</td><td>${formatDate(e.doj)}</td>
          <td><span class="badge badge-${e.status}">${e.status}</span></td>
        </tr>`).join('')}</tbody></table>` : '<div class="empty-state"><p>No employees yet</p></div>';

    const maxCount = Math.max(...stats.byDept.map(d=>d.count), 1);
    document.getElementById('dept-chart').innerHTML = stats.byDept.length ? stats.byDept.map(d=>`
      <div class="dept-bar">
        <div class="dept-name" title="${d._id}">${d._id}</div>
        <div class="dept-track"><div class="dept-fill" style="width:${(d.count/maxCount)*100}%"></div></div>
        <div class="dept-count">${d.count}</div>
      </div>`).join('') : '<div style="color:var(--muted);font-size:13px">No data</div>';
  } catch(e) { toast(e.message, 'error'); }
}

/* ══════════════════════════════════════════
   EMPLOYEES LIST PAGE
══════════════════════════════════════════ */
async function renderEmployees() {
  setPage(`
    <div class="page-header">
      <div><div class="page-title">Employees</div><div class="page-sub">Manage all employee records</div></div>
      <button class="btn btn-primary" onclick="navigateTo('addemployee')">${iconPlus()} Add Employee</button>
    </div>
    <div class="content-body">
      <div class="table-container">
        <div class="table-toolbar">
          <input class="search-input" id="emp-search" placeholder="Search by name, ID or designation…" oninput="filterEmployees()">
          <select class="filter-select" id="dept-filter" onchange="filterEmployees()">
            <option value="">All Departments</option>
          </select>
          <select class="filter-select" id="status-filter" onchange="filterEmployees()">
            <option value="">All Status</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
        <div id="emp-table-body">
          <div style="padding:30px;text-align:center;color:var(--muted)">Loading…</div>
        </div>
      </div>
    </div>
  `);
  try {
    state.employees = await apiFetch('/admin/employees');
    const depts = [...new Set(state.employees.map(e=>e.department))];
    const sel = document.getElementById('dept-filter');
    depts.forEach(d => { const o=document.createElement('option'); o.value=d; o.textContent=d; sel.appendChild(o); });
    renderEmployeeTable(state.employees);
  } catch(e) { toast(e.message, 'error'); }
}

function filterEmployees() {
  const q = document.getElementById('emp-search').value.toLowerCase();
  const dept = document.getElementById('dept-filter').value;
  const status = document.getElementById('status-filter').value;
  const filtered = state.employees.filter(e => {
    const matchQ = !q || e.name.toLowerCase().includes(q) || e.employeeId.toLowerCase().includes(q) || e.designation.toLowerCase().includes(q);
    const matchD = !dept || e.department === dept;
    const matchS = !status || e.status === status;
    return matchQ && matchD && matchS;
  });
  renderEmployeeTable(filtered);
}

function renderEmployeeTable(emps) {
  const body = document.getElementById('emp-table-body');
  if (!emps.length) { body.innerHTML = `<div class="empty-state">${iconPeople()}<h3>No employees found</h3><p>Try adjusting your filters</p></div>`; return; }
  body.innerHTML = `<table><thead><tr>
    <th>Employee</th><th>Designation</th><th>Department</th><th>Location</th><th>DOJ</th><th>Status</th><th>Actions</th>
  </tr></thead><tbody>${emps.map(e=>`
    <tr>
      <td><div class="emp-name-cell">
        <div class="emp-avatar" style="background:${avatarColor(e.name)}">${initials(e.name)}</div>
        <div><div style="font-weight:500">${e.name}</div><div class="emp-code">${e.employeeId}</div></div>
      </div></td>
      <td>${e.designation}</td><td>${e.department}</td><td>${e.location}</td>
      <td>${formatDate(e.doj)}</td>
      <td><span class="badge badge-${e.status}">${e.status}</span></td>
      <td><div class="actions">
        <button class="btn btn-secondary btn-sm" onclick="viewEmployee('${e._id}')">View</button>
        <button class="btn btn-secondary btn-sm" onclick="editEmployee('${e._id}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteEmployee('${e._id}','${e.name}')">Del</button>
      </div></td>
    </tr>`).join('')}</tbody></table>`;
}

/* ══════════════════════════════════════════
   ADD EMPLOYEE PAGE
══════════════════════════════════════════ */
function renderAddEmployee() {
  setPage(`
    <div class="page-header">
      <div><div class="page-title">Add New Employee</div><div class="page-sub">Fill in the details to create an employee account</div></div>
    </div>
    <div class="content-body" style="max-width:700px">
      <div class="table-container" style="padding:28px">
        <div class="form-row">
          <div class="form-group"><label>Full Name *</label><input class="input" id="f-name" placeholder="e.g. Priya Sharma"></div>
          <div class="form-group"><label>Designation *</label><input class="input" id="f-desig" placeholder="e.g. Software Engineer"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Date of Joining *</label><input class="input" id="f-doj" type="date"></div>
          <div class="form-group"><label>Department *</label>
            <select class="input" id="f-dept">
              <option value="">Select Department</option>
              <option>Engineering</option><option>Product</option><option>Design</option>
              <option>Marketing</option><option>Sales</option><option>HR</option>
              <option>Finance</option><option>Operations</option><option>Legal</option><option>Customer Success</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Location *</label><input class="input" id="f-loc" placeholder="e.g. Bengaluru"></div>
          <div class="form-group"><label>Email</label><input class="input" id="f-email" type="email" placeholder="priya@company.com"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Phone</label><input class="input" id="f-phone" placeholder="+91 9876543210"></div>
          <div></div>
        </div>
        <div style="display:flex;gap:12px;margin-top:8px">
          <button class="btn btn-primary" onclick="submitAddEmployee()">Create Employee Account</button>
          <button class="btn btn-secondary" onclick="navigateTo('employees')">Cancel</button>
        </div>
      </div>
    </div>
  `);
}

async function submitAddEmployee() {
  const name = document.getElementById('f-name').value.trim();
  const designation = document.getElementById('f-desig').value.trim();
  const doj = document.getElementById('f-doj').value;
  const department = document.getElementById('f-dept').value;
  const location = document.getElementById('f-loc').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  if (!name||!designation||!doj||!department||!location) return toast('Please fill all required fields','warn');
  try {
    const data = await apiFetch('/admin/employees', { method:'POST', body:JSON.stringify({name,designation,doj,department,location,email,phone}) });
    showCredentialsModal(data.credentials, data.employee);
    toast('Employee created successfully!');
  } catch(e) { toast(e.message,'error'); }
}

function showCredentialsModal(creds, emp) {
  openModal(`
    <div class="modal-header">
      <div class="modal-title">Employee Created 🎉</div>
      <button class="close-btn" onclick="closeModal();navigateTo('employees')">✕</button>
    </div>
    <div class="success-icon">
      <svg viewBox="0 0 56 56" fill="none"><circle cx="28" cy="28" r="28" fill="rgba(110,231,183,0.1)"/><circle cx="28" cy="28" r="20" fill="rgba(110,231,183,0.15)" stroke="rgba(110,231,183,0.4)" stroke-width="1"/><path d="M18 28l7 7 13-13" stroke="#6ee7b7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <p style="color:var(--muted);font-size:13px;text-align:center;margin-bottom:20px">Share these login credentials with <strong style="color:var(--text)">${emp.name}</strong>. The employee can change their password after logging in.</p>
    <div style="background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:20px;margin-bottom:8px">
      ${credRow('Employee ID', creds.employeeId)}
      ${credRow('Username', creds.username)}
      ${credRow('Password', creds.password)}
    </div>
    <p style="font-size:11px;color:var(--muted);margin-bottom:20px">⚠ Save these credentials now. The password will not be shown again.</p>
    <div style="display:flex;gap:10px">
      <button class="btn btn-primary" style="flex:1" onclick="closeModal();navigateTo('employees')">Done</button>
      <button class="btn btn-secondary" onclick="closeModal();navigateTo('addemployee')">Add Another</button>
    </div>
  `);
}

function credRow(label, value) {
  return `<div class="cred-copy-row">
    <div style="width:110px;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;flex-shrink:0">${label}</div>
    <input class="cred-input" value="${value}" readonly>
    <button class="copy-btn" onclick="copyVal('${value}',this)">Copy</button>
  </div>`;
}

function copyVal(val, btn) {
  navigator.clipboard.writeText(val).then(()=>{ btn.textContent='Copied!'; setTimeout(()=>btn.textContent='Copy',1500); });
}

/* ══════════════════════════════════════════
   VIEW EMPLOYEE MODAL
══════════════════════════════════════════ */
async function viewEmployee(id) {
  try {
    const e = await apiFetch(`/admin/employees/${id}`);
    openModal(`
      <div class="modal-header">
        <div class="modal-title">Employee Details</div>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <div style="display:flex;align-items:center;gap:16px;padding:16px;background:var(--surface);border-radius:var(--r2);margin-bottom:20px">
        <div class="emp-avatar" style="width:52px;height:52px;border-radius:50%;font-size:18px;background:${avatarColor(e.name)};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700">${initials(e.name)}</div>
        <div>
          <div style="font-size:18px;font-weight:700">${e.name}</div>
          <div style="color:var(--muted);font-size:13px">${e.designation} · ${e.department}</div>
          <span class="badge badge-${e.status}" style="margin-top:4px">${e.status}</span>
        </div>
      </div>
      <div style="display:grid;gap:8px">
        ${infoRow('Employee ID', `<span style="font-family:monospace;color:var(--accent)">${e.employeeId}</span>`)}
        ${infoRow('Username', `<span style="font-family:monospace;color:var(--accent2)">${e.username}</span>`)}
        ${infoRow('Department', e.department)}
        ${infoRow('Location', e.location)}
        ${infoRow('Date of Joining', formatDate(e.doj))}
        ${e.email ? infoRow('Email', e.email) : ''}
        ${e.phone ? infoRow('Phone', e.phone) : ''}
        ${infoRow('Created', formatDate(e.createdAt))}
      </div>
      <div style="display:flex;gap:10px;margin-top:20px">
        <button class="btn btn-secondary" style="flex:1" onclick="closeModal();editEmployee('${e._id}')">Edit Employee</button>
        <button class="btn btn-secondary" style="flex:1" onclick="closeModal()">Close</button>
      </div>
    `, 'wide');
  } catch(err) { toast(err.message,'error'); }
}

function infoRow(label, val) {
  return `<div class="info-row"><span class="info-label">${label}</span><span class="info-value">${val}</span></div>`;
}

/* ══════════════════════════════════════════
   EDIT EMPLOYEE MODAL
══════════════════════════════════════════ */
async function editEmployee(id) {
  try {
    const e = await apiFetch(`/admin/employees/${id}`);
    openModal(`
      <div class="modal-header">
        <div class="modal-title">Edit Employee</div>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Full Name</label><input class="input" id="e-name" value="${e.name}"></div>
        <div class="form-group"><label>Designation</label><input class="input" id="e-desig" value="${e.designation}"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>DOJ</label><input class="input" id="e-doj" type="date" value="${e.doj?.split('T')[0]||''}"></div>
        <div class="form-group"><label>Department</label>
          <select class="input" id="e-dept">
            ${['Engineering','Product','Design','Marketing','Sales','HR','Finance','Operations','Legal','Customer Success'].map(d=>`<option ${d===e.department?'selected':''}>${d}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Location</label><input class="input" id="e-loc" value="${e.location}"></div>
        <div class="form-group"><label>Email</label><input class="input" id="e-email" type="email" value="${e.email||''}"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Phone</label><input class="input" id="e-phone" value="${e.phone||''}"></div>
        <div class="form-group"><label>Status</label>
          <select class="input" id="e-status">
            <option value="active" ${e.status==='active'?'selected':''}>Active</option>
            <option value="inactive" ${e.status==='inactive'?'selected':''}>Inactive</option>
          </select>
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button class="btn btn-primary" style="flex:1" onclick="submitEditEmployee('${e._id}')">Save Changes</button>
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      </div>
    `, 'wide');
  } catch(err) { toast(err.message,'error'); }
}

async function submitEditEmployee(id) {
  const body = {
    name: document.getElementById('e-name').value.trim(),
    designation: document.getElementById('e-desig').value.trim(),
    doj: document.getElementById('e-doj').value,
    department: document.getElementById('e-dept').value,
    location: document.getElementById('e-loc').value.trim(),
    email: document.getElementById('e-email').value.trim(),
    phone: document.getElementById('e-phone').value.trim(),
    status: document.getElementById('e-status').value,
  };
  try {
    await apiFetch(`/admin/employees/${id}`, { method:'PUT', body: JSON.stringify(body) });
    toast('Employee updated!');
    closeModal();
    navigateTo('employees');
  } catch(e) { toast(e.message,'error'); }
}

/* ══════════════════════════════════════════
   DELETE EMPLOYEE
══════════════════════════════════════════ */
function deleteEmployee(id, name) {
  openModal(`
    <div class="modal-header">
      <div class="modal-title" style="color:var(--danger)">Delete Employee</div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <p style="color:var(--muted);margin-bottom:20px">Are you sure you want to delete <strong style="color:var(--text)">${name}</strong>? This action cannot be undone.</p>
    <div style="display:flex;gap:10px">
      <button class="btn btn-danger" style="flex:1" onclick="confirmDelete('${id}')">Yes, Delete</button>
      <button class="btn btn-secondary" style="flex:1" onclick="closeModal()">Cancel</button>
    </div>
  `);
}

async function confirmDelete(id) {
  try {
    await apiFetch(`/admin/employees/${id}`, { method:'DELETE' });
    toast('Employee deleted', 'warn');
    closeModal();
    navigateTo('employees');
  } catch(e) { toast(e.message,'error'); }
}

/* ══════════════════════════════════════════
   EMPLOYEE: MY PROFILE

          <div style="font-size:16px;font-weight:700">${formatDate(e.doj)}</div>
        </div>
      </div>
      <div class="info-grid">
        <div class="info-card">
          <div class="info-card-title">Personal Information</div>
          ${infoRow('Full Name', e.name)}
          ${infoRow('Designation', e.designation)}
          ${infoRow('Department', e.department)}

          ${e.email ? infoRow('Email', e.email) : ''}
          ${e.phone ? infoRow('Phone', e.phone) : ''}

/* ══════════════════════════════════════════
   EMPLOYEE: CHANGE PASSWORD
══════════════════════════════════════════ */
function renderChangePassword() {
  setPage(`
    <div class="page-header">
      <div><div class="page-title">Change Password</div><div class="page-sub">Update your account password</div></div>
    </div>
    <div class="content-body" style="max-width:480px">
      <div class="table-container" style="padding:28px">
        <div class="form-group"><label>Current Password</label><input class="input" id="cp-current" type="password" placeholder="Enter current password"></div>
        <div class="form-group"><label>New Password</label><input class="input" id="cp-new" type="password" placeholder="At least 6 characters"></div>
        <div class="form-group"><label>Confirm New Password</label><input class="input" id="cp-confirm" type="password" placeholder="Re-enter new password"></div>
        <div style="display:flex;gap:10px;margin-top:8px">
          <button class="btn btn-primary" onclick="submitChangePassword()">Update Password</button>
          <button class="btn btn-secondary" onclick="navigateTo('myprofile')">Cancel</button>
        </div>
      </div>
    </div>
  `);
}

async function submitChangePassword() {
  const currentPassword = document.getElementById('cp-current').value;
  const newPassword = document.getElementById('cp-new').value;
  const confirm = document.getElementById('cp-confirm').value;
  if (!currentPassword||!newPassword||!confirm) return toast('Fill all fields','warn');
  if (newPassword !== confirm) return toast('Passwords do not match','error');
  if (newPassword.length < 6) return toast('Password must be at least 6 characters','warn');
  try {
    await apiFetch('/employee/change-password', { method:'PUT', body:JSON.stringify({currentPassword,newPassword}) });
    toast('Password changed successfully!');
    document.getElementById('cp-current').value='';
    document.getElementById('cp-new').value='';
    document.getElementById('cp-confirm').value='';
  } catch(e) { toast(e.message,'error'); }
}

/* ══════════════════════════════════════════
   MODAL HELPERS
══════════════════════════════════════════ */
function openModal(html, cls='') {
  document.getElementById('modal-root').innerHTML = `
    <div class="modal-overlay" onclick="handleOverlayClick(event)">
      <div class="modal ${cls}">${html}</div>
    </div>`;
}
function closeModal() { document.getElementById('modal-root').innerHTML = ''; }
function handleOverlayClick(e) { if(e.target.classList.contains('modal-overlay')) closeModal(); }

/* ══════════════════════════════════════════
   PAGE RENDERER
══════════════════════════════════════════ */
function setPage(html) {
  document.getElementById('page-container').innerHTML = html;
}

setTimeout(() => {
  document.getElementById('app-loader').classList.add('hidden');
  autoLogin();

// Auto Login System
function autoLogin() {
  const token = localStorage.getItem("token");
  const role  = localStorage.getItem("role");

  console.log("AutoLogin:", { token, role });

  // Not logged in
  if (!token || !role) {
    document.getElementById('login-page').classList.remove('hidden');
    return;
  }

  // Set state
  state.token = token;
  state.role = role;
  state.user = localStorage.getItem("user");

  // Go to dashboard
  enterDashboard();
}
